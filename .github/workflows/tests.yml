name: tests
on:
  push:
    paths-ignore:
      - '**.md'
      - '**.ipynb'
      - '**.bib'
      - 'ms/*'
  pull_request:
    # `synchronize` re-runs the suite when new commits are pushed to an open PR;
    # without it the tests only ran on PR open/reopen and missed later commits.
    types: [opened, reopened, synchronize]
    paths-ignore:
      - '**.md'
      - '**.ipynb'
      - '**.bib'
      - 'ms/*'

jobs:

  create-env:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -l {0}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: create environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ matrix.python-version }}
          # mamba-version: "*"
          channels: conda-forge,bioconda,defaults
          auto-activate-base: false
          activate-environment: tests_brendapyrser
          environment-file: envs/brendapyrser-dev.yml

      - name: Build & Install BRENDApyrser
        run: poetry build && pip install dist/brendapyrser*.whl

      - name: Run tests and collect coverage
        run: coverage run -m unittest discover tests && coverage xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          version: "v0.1.15"
        # Forks have no access to repo secrets, so the upload may be rejected.
        # Coverage is informational only — never fail a contributor's PR on it.
        continue-on-error: true
